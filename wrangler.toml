name = "silk-gateway"
main = "worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# 自定义域名绑定
routes = [
  { pattern = "api.silkgateway.ai/*", zone_name = "silkgateway.ai" }
]

# KV 命名空间说明:
# API_KEYS: 存储 API Keys、用户数据、Provider 配置、Connection (Key Pool)、Combo 定义
#   key 前缀: user: | sk- | provider: | conn: | combo: | rr: | ratelimit:
# RATE_LIMIT_KV: 限流计数器
# USAGE_LOG: 月度/每日用量统计
# LOGS: (预留)
#
# 先用以下命令创建：
#   wrangler kv namespace create API_KEYS
#   wrangler kv namespace create RATE_LIMIT_KV
#   wrangler kv namespace create USAGE_LOG
# 然后把生成的 ID 填入下方

[[kv_namespaces]]
binding = "API_KEYS"
id = "1fc8360ffe104064bb02132ccdade18b"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "aed3082705b0400fa00743fd0cb78da7"

[[kv_namespaces]]
binding = "USAGE_LOG"
id = "3e51f6a6f1d74faba45288bcfea36f2e"

[[kv_namespaces]]
binding = "LOGS"
id = "ae652fa92c7944589801b618a4310ab0"

[[d1_databases]]
binding = "DB"
database_name = "silk-gateway-logs"
database_id = "83b49dac-fcea-4b28-818b-994f093d6831"

# 环境变量（敏感信息不要写在这里，用 wrangler secret put）
# [vars]
# DEFAULT_PROVIDER = "volcengine"

# 密钥配置（部署时用命令设置）
# wrangler secret put VOLCENGINE_API_KEY
# wrangler secret put DEEPSEEK_API_KEY
# wrangler secret put KIMI_API_KEY
# wrangler secret put MIMO_API_KEY
# wrangler secret put OPENAI_API_KEY
# wrangler secret put ADMIN_SECRET  # 管理员密钥（充值、监控、Provider/Connection/Combo 管理端点鉴权，必填）
# wrangler secret put JWT_SECRET    # JWT 签名密钥（用户登录会话，必填）
# wrangler secret put RESEND_API_KEY  # Resend 邮件 API key（注册验证、密码重置邮件）
# wrangler secret put MAIL_FROM      # 可选：发件人地址（默认 onboarding@resend.dev）
